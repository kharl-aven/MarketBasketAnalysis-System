name: MBA Pipeline
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'
jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - run: python src/pipeline.py --input data/raw/orders.csv --auto-tune
